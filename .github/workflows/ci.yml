name: QA Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: pcov
        tools: composer:v2

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Security Check
      run: composer audit

    - name: Run Linting (PHP CS Fixer)
      run: composer lint

    - name: Run Static Analysis (PHPStan)
      run: composer analyze

    - name: Run Test Suite & Code Coverage
      run: composer test -- --coverage-clover coverage.xml

    - name: Enforce Code Coverage
      run: |
        php -r "
          \$xml = simplexml_load_file('coverage.xml');
          \$metrics = \$xml->project->metrics;
          if (\$metrics['elements'] == 0) {
              echo \"No tests found!\\n\";
              exit(0); // Optional: change to exit(1) to fail if no tests exist
          }
          \$coverage = (\$metrics['coveredelements'] / \$metrics['elements']) * 100;
          echo \"Total Code Coverage: \" . number_format(\$coverage, 2) . \"%\\n\";
          if (\$coverage < 80) {
              echo \"Error: Code coverage is below 80%.\\n\";
              exit(1);
          }
        "
